[tool.ruff]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP"]
ignore = [
    "E501",   # line too long — handled by formatter
    "E741",   # ambiguous variable name (l, O, I) — proxy uses 'l' in log calls
    "F841",   # local var assigned but never used — some are intentional guards
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["E402"]  # module-level import not at top (sys.path.insert needed)
