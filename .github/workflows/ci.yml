name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check proxy.py tests/

  test:
    name: Test — Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Validate config
        run: python proxy.py --validate

      - name: Run tests
        run: pytest tests/ -v --tb=short

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t rotakey:ci .
      - name: Smoke test container
        run: |
          docker run -d --name rotakey-ci \
            -v ${{ github.workspace }}/rotakey.yaml:/app/rotakey.yaml:ro \
            rotakey:ci
          sleep 8
          echo "=== container logs ==="
          docker logs rotakey-ci
          echo "=== container status ==="
          docker inspect rotakey-ci --format '{{.State.Status}} exit={{.State.ExitCode}}'
          docker exec rotakey-ci python3 -c \
            "import urllib.request; print(urllib.request.urlopen('http://127.0.0.1:8765/health').read().decode())"
          docker stop rotakey-ci
